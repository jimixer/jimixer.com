name: Daily Rebuild

on:
  schedule:
    # 毎日 JST 9:00 (UTC 0:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website (fetch latest RSS)
        run: npm run build --workspace=website

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name JimixerComStack \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text)

          # ハッシュ付き静的アセットは長期キャッシュ
          aws s3 sync website/out/_next/static/ s3://$BUCKET_NAME/_next/static/ \
            --delete --cache-control "public, max-age=31536000, immutable"

          # HTML・sitemap・robots.txt など動的コンテンツは短期キャッシュ
          aws s3 sync website/out/ s3://$BUCKET_NAME --delete \
            --exclude "_next/static/*" \
            --cache-control "public, max-age=3600"

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name JimixerComStack \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text)

          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/notes/*" "/sitemap.xml"
